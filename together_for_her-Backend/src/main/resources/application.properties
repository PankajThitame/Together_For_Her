spring.application.name=together_for_her
server.port=8080
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/together_for_her_apis?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# File upload location
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Twilio Configuration
twilio.account_sid=${TWILIO_ACCOUNT_SID}
twilio.auth_token=${TWILIO_AUTH_TOKEN}
twilio.phone_number=${TWILIO_PHONE_NUMBER}

# Razorpay Configuration
razorpay.key_id=${RAZORPAY_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET}

# AWS Configuration (Placeholder for future use)
# aws.access-key=${AWS_ACCESS_KEY}
# aws.secret-key=${AWS_SECRET_KEY}
# aws.s3.region=${AWS_REGION:ap-south-1}
# aws.s3.bucket-name=${AWS_S3_BUCKET}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
spring.jpa.show-sql=false
logging.level.org.springframework.security=INFO
