spring.application.name=together_for_her
server.port=8080

# -----------------------------
# Multipart Configuration
# -----------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -----------------------------
# Database Configuration (RDS)
# -----------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# -----------------------------
# File Upload (S3 recommended)
# -----------------------------
file.upload-dir=${FILE_UPLOAD_DIR}

# -----------------------------
# Twilio Configuration
# -----------------------------
twilio.account_sid=${TWILIO_ACCOUNT_SID}
twilio.auth_token=${TWILIO_AUTH_TOKEN}
twilio.phone_number=${TWILIO_PHONE_NUMBER}

# -----------------------------
# Razorpay Configuration
# -----------------------------
razorpay.key_id=${RAZORPAY_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET}

# -----------------------------
# Logging
# -----------------------------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR

# -----------------------------
# Server Security
# -----------------------------
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

